# Real-backend resilience example only. Copy/adapt this file into a local run configuration.
# It is not loaded by default and does not change src/main/resources/application.properties.
# Replace the loopback URLs with local or private HTTP services that you control.
# Retries stay bounded and non-idempotent retries remain disabled unless you explicitly change them.
# See docs/REAL_BACKEND_PROXY_EXAMPLES.md for status-page and header verification steps.
server.address=127.0.0.1
server.port=8080

loadbalancerpro.proxy.enabled=true
loadbalancerpro.proxy.strategy=ROUND_ROBIN
loadbalancerpro.proxy.request-timeout=2s
loadbalancerpro.proxy.max-request-bytes=65536

loadbalancerpro.proxy.health-check.enabled=true
loadbalancerpro.proxy.health-check.path=/health
loadbalancerpro.proxy.health-check.timeout=1s
loadbalancerpro.proxy.health-check.interval=5s

loadbalancerpro.proxy.retry.enabled=true
loadbalancerpro.proxy.retry.max-attempts=2
loadbalancerpro.proxy.retry.retry-non-idempotent=false
loadbalancerpro.proxy.retry.methods=GET,HEAD
loadbalancerpro.proxy.retry.retry-statuses=502,503,504

loadbalancerpro.proxy.cooldown.enabled=true
loadbalancerpro.proxy.cooldown.consecutive-failure-threshold=2
loadbalancerpro.proxy.cooldown.duration=30s
loadbalancerpro.proxy.cooldown.recover-on-successful-health-check=true

loadbalancerpro.proxy.upstreams[0].id=local-api-a
loadbalancerpro.proxy.upstreams[0].url=http://localhost:9001
loadbalancerpro.proxy.upstreams[0].healthy=true
loadbalancerpro.proxy.upstreams[0].weight=1.0

loadbalancerpro.proxy.upstreams[1].id=local-api-b
loadbalancerpro.proxy.upstreams[1].url=http://localhost:9002
loadbalancerpro.proxy.upstreams[1].healthy=true
loadbalancerpro.proxy.upstreams[1].weight=1.0
