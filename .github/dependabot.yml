version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    # Phase 1: target the canonical project branch while GitHub default-branch
    # cleanup is still pending.
    target-branch: "loadbalancerpro-clean"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      maven-low-risk-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "spring-boot.version"
          - "org.springframework.boot:*"
          - "org.springdoc:*"
          - "org.openjfx:*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    # Keep workflow update PRs off the small recreated main until branch cleanup.
    target-branch: "loadbalancerpro-clean"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    # Keep Docker update PRs on the canonical project branch during Phase 1.
    target-branch: "loadbalancerpro-clean"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
