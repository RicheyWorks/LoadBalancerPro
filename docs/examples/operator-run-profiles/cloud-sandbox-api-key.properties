# Copy/adapt cloud-sandbox API-key boundary settings.
# The profile is dry-run by default and should stay loopback/private for local validation.
spring.profiles.active=cloud-sandbox
server.address=127.0.0.1
server.port=8080
loadbalancerpro.auth.mode=api-key
loadbalancerpro.api.key=${LOADBALANCERPRO_API_KEY:CHANGE_ME_LOCAL_API_KEY}
loadbalancerpro.proxy.enabled=false
cloud.liveMode=false
cloud.allowLiveMutation=false
cloud.allowResourceDeletion=false
cloud.confirmResourceOwnership=false
cloud.allowAutonomousScaleUp=false
cloud.environment=sandbox
cloud.resourceNamePrefix=lbp-sandbox-
