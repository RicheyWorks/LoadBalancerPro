management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.prometheus.metrics.export.enabled=true
management.otlp.metrics.export.enabled=false
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:}
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=loadbalancerpro
management.metrics.tags.environment=local
management.opentelemetry.resource-attributes[service.name]=loadbalancerpro
management.opentelemetry.resource-attributes[service.version]=2.5.0
management.opentelemetry.resource-attributes[deployment.environment]=local
loadbalancerpro.app.version=2.5.0
loadbalancerpro.telemetry.otlp.require-private-endpoint=true
loadbalancerpro.telemetry.otlp.allow-insecure-localhost=true
loadbalancerpro.telemetry.startup-summary.enabled=true
loadbalancerpro.api.max-request-bytes=16384
loadbalancerpro.api.cors.allowed-origins=http://localhost:3000,http://localhost:8080
loadbalancerpro.auth.mode=api-key
loadbalancerpro.auth.oauth2.issuer-uri=
loadbalancerpro.auth.oauth2.jwk-set-uri=
loadbalancerpro.auth.docs-public=false
loadbalancerpro.auth.required-role.lase-shadow=observer
loadbalancerpro.auth.required-role.allocation=operator
loadbalancerpro.api.rate-limit.enabled=false
loadbalancerpro.api.rate-limit.capacity=60
loadbalancerpro.api.rate-limit.refill-tokens=60
loadbalancerpro.api.rate-limit.refill-period=PT1M
loadbalancerpro.api.rate-limit.trust-forwarded-for=false
loadbalancerpro.lase.shadow.enabled=false
loadbalancerpro.proxy.enabled=false
loadbalancerpro.proxy.strategy=ROUND_ROBIN
loadbalancerpro.proxy.request-timeout=2s
loadbalancerpro.proxy.max-request-bytes=65536
loadbalancerpro.proxy.private-network-validation.enabled=false
loadbalancerpro.proxy.private-network-live-validation.enabled=false
loadbalancerpro.proxy.private-network-live-validation.operator-approved=false
loadbalancerpro.proxy.health-check.enabled=false
loadbalancerpro.proxy.health-check.path=/health
loadbalancerpro.proxy.health-check.timeout=1s
loadbalancerpro.proxy.health-check.interval=30s
loadbalancerpro.proxy.retry.enabled=false
loadbalancerpro.proxy.retry.max-attempts=2
loadbalancerpro.proxy.retry.retry-non-idempotent=false
loadbalancerpro.proxy.retry.methods=GET,HEAD
loadbalancerpro.proxy.retry.retry-statuses=502,503,504
loadbalancerpro.proxy.cooldown.enabled=false
loadbalancerpro.proxy.cooldown.consecutive-failure-threshold=2
loadbalancerpro.proxy.cooldown.duration=30s
loadbalancerpro.proxy.cooldown.recover-on-successful-health-check=true
info.app.name=LoadBalancerPro
info.app.version=2.5.0
info.app.description=Calculation-only load allocation API
