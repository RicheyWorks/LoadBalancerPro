name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional dry-run version without leading v. Defaults to pom.xml project.version.
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  # Required by actions/attest@v4.1.0 for artifact storage records.
  artifact-metadata: write

jobs:
  release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Java
        # actions/setup-java@v5
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve release version
        id: resolve-release
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail

          RELEASE_PUBLISH=false
          RELEASE_MODE=dry-run

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release artifact workflow only accepts semantic version tags like v1.6.1. Got: $TAG"
              exit 1
            fi

            RELEASE_VERSION="${TAG#v}"
            RELEASE_PUBLISH=true
            RELEASE_MODE=publish
            ARTIFACT_BUNDLE_NAME="loadbalancerpro-release-${RELEASE_VERSION}"
          else
            if [ -n "$INPUT_VERSION" ]; then
              RELEASE_VERSION="$INPUT_VERSION"
            else
              RELEASE_VERSION="$(mvn -q -DforceStdout -Dstyle.color=never help:evaluate -Dexpression=project.version | tail -n 1 | tr -d '\r')"
            fi

            if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release dry run requires a semantic version like 2.4.3. Got: $RELEASE_VERSION"
              exit 1
            fi

            ARTIFACT_BUNDLE_NAME="loadbalancerpro-release-${RELEASE_VERSION}-dry-run"
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_MODE=$RELEASE_MODE" >> "$GITHUB_ENV"
          echo "RELEASE_PUBLISH=$RELEASE_PUBLISH" >> "$GITHUB_ENV"
          echo "ARTIFACT_BUNDLE_NAME=$ARTIFACT_BUNDLE_NAME" >> "$GITHUB_ENV"
          echo "release_publish=$RELEASE_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE_VERSION"
          echo "Release mode: $RELEASE_MODE"

      - name: Verify Maven version matches release version
        shell: bash
        run: |
          set -euo pipefail

          MAVEN_VERSION="$(mvn -q -DforceStdout -Dstyle.color=never help:evaluate -Dexpression=project.version | tail -n 1 | tr -d '\r')"
          if [ "$MAVEN_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release version and Maven project version differ."
            echo "Release version: $RELEASE_VERSION"
            echo "Maven version: $MAVEN_VERSION"
            exit 1
          fi

          echo "Maven project version matches release version: $MAVEN_VERSION"

      - name: Package executable JAR
        run: mvn -B -DskipTests package

      - name: Locate executable JAR
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_JAR="target/LoadBalancerPro-${RELEASE_VERSION}.jar"
          if [ -f "$EXPECTED_JAR" ]; then
            RELEASE_JAR="$EXPECTED_JAR"
          else
            mapfile -t candidates < <(find target -maxdepth 1 -type f -name 'LoadBalancerPro-*.jar' \
              ! -name '*-sources.jar' \
              ! -name '*-javadoc.jar' \
              ! -name '*-tests.jar' \
              ! -name '*-plain.jar' \
              ! -name '*-original.jar' | sort)

            if [ "${#candidates[@]}" -ne 1 ]; then
              echo "Expected exactly one executable release JAR, found ${#candidates[@]}."
              printf '%s\n' "${candidates[@]}"
              exit 1
            fi

            RELEASE_JAR="${candidates[0]}"
          fi

          echo "RELEASE_JAR=$RELEASE_JAR" >> "$GITHUB_ENV"
          echo "Executable release JAR: $RELEASE_JAR"

      - name: Smoke test release JAR
        shell: bash
        run: |
          set -euo pipefail

          assert_contains() {
            local file="$1"
            local expected="$2"
            if ! grep -Fq "$expected" "$file"; then
              echo "Expected to find: $expected"
              cat "$file"
              exit 1
            fi
          }

          assert_not_contains() {
            local file="$1"
            local unexpected="$2"
            if grep -Fq "$unexpected" "$file"; then
              echo "Unexpected output found: $unexpected"
              cat "$file"
              exit 1
            fi
          }

          VERSION_LOG="$(mktemp)"
          HEALTHY_LOG="$(mktemp)"
          INVALID_LOG="$(mktemp)"

          java -jar "$RELEASE_JAR" --version >"$VERSION_LOG" 2>&1
          assert_contains "$VERSION_LOG" "LoadBalancerPro version $RELEASE_VERSION"

          java -jar "$RELEASE_JAR" --lase-demo=healthy >"$HEALTHY_LOG" 2>&1
          assert_contains "$HEALTHY_LOG" "=== LoadBalancerPro LASE Synthetic Demo ==="
          assert_contains "$HEALTHY_LOG" "Evaluation ID: lase-demo-healthy"
          assert_contains "$HEALTHY_LOG" "recommendation-only"
          assert_contains "$HEALTHY_LOG" "No live AWS resources touched"
          assert_contains "$HEALTHY_LOG" "No CloudManager calls"

          set +e
          java -jar "$RELEASE_JAR" --lase-demo=invalid-name >"$INVALID_LOG" 2>&1
          invalid_status=$?
          set -e
          if [ "$invalid_status" -eq 0 ]; then
            echo "Invalid LASE demo scenario unexpectedly succeeded."
            cat "$INVALID_LOG"
            exit 1
          fi
          assert_contains "$INVALID_LOG" "Invalid LASE demo scenario"
          assert_contains "$INVALID_LOG" "Valid values:"
          assert_contains "$INVALID_LOG" "healthy"
          assert_contains "$INVALID_LOG" "overloaded"
          assert_not_contains "$INVALID_LOG" "Exception"
          assert_not_contains "$INVALID_LOG" "java.lang"

      - name: Generate CycloneDX SBOM
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom -DoutputFormat=all -DoutputDirectory=target -DoutputName=bom -Dcyclonedx.skipAttach=true

      - name: Stage deterministic release artifacts
        shell: bash
        run: |
          set -euo pipefail

          test -f "$RELEASE_JAR"
          test -f target/bom.json
          test -f target/bom.xml

          mkdir -p release-artifacts
          cp "$RELEASE_JAR" "release-artifacts/LoadBalancerPro-${RELEASE_VERSION}.jar"
          cp target/bom.json "release-artifacts/LoadBalancerPro-${RELEASE_VERSION}-bom.json"
          cp target/bom.xml "release-artifacts/LoadBalancerPro-${RELEASE_VERSION}-bom.xml"

          ls -l release-artifacts

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail

          cd release-artifacts
          sha256sum \
            "LoadBalancerPro-${RELEASE_VERSION}.jar" \
            "LoadBalancerPro-${RELEASE_VERSION}-bom.json" \
            "LoadBalancerPro-${RELEASE_VERSION}-bom.xml" \
            > "LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt"

          cat "LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt"

      - name: Verify SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail

          cd release-artifacts
          sha256sum -c "LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt"

      - name: Summarize release artifact bundle
        shell: bash
        run: |
          set -euo pipefail

          echo "Release mode: $RELEASE_MODE"
          echo "Publishing enabled: $RELEASE_PUBLISH"
          echo "Release artifact bundle:"
          cd release-artifacts
          ls -l
          sha256sum \
            "LoadBalancerPro-${RELEASE_VERSION}.jar" \
            "LoadBalancerPro-${RELEASE_VERSION}-bom.json" \
            "LoadBalancerPro-${RELEASE_VERSION}-bom.xml" \
            "LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt"

      - name: Attest release JAR provenance
        if: steps.resolve-release.outputs.release_publish == 'true'
        # actions/attest@v4.1.0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: release-artifacts/LoadBalancerPro-${{ env.RELEASE_VERSION }}.jar

      - name: Attest release JAR SBOM
        if: steps.resolve-release.outputs.release_publish == 'true'
        # actions/attest@v4.1.0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: release-artifacts/LoadBalancerPro-${{ env.RELEASE_VERSION }}.jar
          sbom-path: release-artifacts/LoadBalancerPro-${{ env.RELEASE_VERSION }}-bom.json

      - name: Prepare GitHub Release notes
        if: steps.resolve-release.outputs.release_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_NOTES_FILE="$RUNNER_TEMP/loadbalancerpro-release-notes.md"
          cat > "$RELEASE_NOTES_FILE" <<EOF
          LoadBalancerPro v${RELEASE_VERSION}

          Artifacts:
          - LoadBalancerPro-${RELEASE_VERSION}.jar
          - LoadBalancerPro-${RELEASE_VERSION}-bom.json
          - LoadBalancerPro-${RELEASE_VERSION}-bom.xml
          - LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt

          Checksums are included in LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt.

          This release was published automatically from the existing ${GITHUB_REF_NAME} tag.
          EOF

          echo "RELEASE_NOTES_FILE=$RELEASE_NOTES_FILE" >> "$GITHUB_ENV"

      - name: Publish GitHub Release assets
        if: steps.resolve-release.outputs.release_publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="$GITHUB_REF_NAME"
          ASSET_DIR="release-artifacts"
          expected_assets=(
            "LoadBalancerPro-${RELEASE_VERSION}.jar"
            "LoadBalancerPro-${RELEASE_VERSION}-bom.json"
            "LoadBalancerPro-${RELEASE_VERSION}-bom.xml"
            "LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt"
          )
          asset_paths=()
          for asset in "${expected_assets[@]}"; do
            path="$ASSET_DIR/$asset"
            test -f "$path"
            asset_paths+=("$path")
          done

          mapfile -t release_tags < <(
            gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName --jq '.[].tagName' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true
          )
          highest_version="$(
            printf '%s\n' "${release_tags[@]}" "$TAG" \
              | sed 's/^v//' \
              | sort -V \
              | tail -n 1
          )"
          latest_args=(--latest=false)
          if [ "$highest_version" = "$RELEASE_VERSION" ]; then
            latest_args=(--latest)
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists; verifying existing asset names before upload."
            existing_is_draft="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')"
            existing_is_prerelease="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq '.isPrerelease')"
            if [ "$existing_is_draft" != "false" ]; then
              echo "Refusing to update draft release $TAG."
              exit 1
            fi
            if [ "$existing_is_prerelease" != "false" ]; then
              echo "Refusing to update prerelease $TAG."
              exit 1
            fi

            mapfile -t existing_assets < <(
              gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort
            )
            expected_sorted="$(printf '%s\n' "${expected_assets[@]}" | sort)"
            for existing in "${existing_assets[@]}"; do
              if ! grep -Fxq "$existing" <<< "$expected_sorted"; then
                echo "Refusing to overwrite release with unexpected existing asset: $existing"
                printf 'Expected assets:\n%s\n' "$expected_sorted"
                printf 'Existing assets:\n%s\n' "$(printf '%s\n' "${existing_assets[@]}")"
                exit 1
              fi
            done

            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" "${asset_paths[@]}" --clobber
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "LoadBalancerPro v${RELEASE_VERSION}" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --verify-tag \
              "${latest_args[@]}" \
              "${asset_paths[@]}"
          fi

      - name: Verify GitHub Release assets
        if: steps.resolve-release.outputs.release_publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="$GITHUB_REF_NAME"
          expected_sorted="$(
            printf '%s\n' \
              "LoadBalancerPro-${RELEASE_VERSION}.jar" \
              "LoadBalancerPro-${RELEASE_VERSION}-bom.json" \
              "LoadBalancerPro-${RELEASE_VERSION}-bom.xml" \
              "LoadBalancerPro-${RELEASE_VERSION}-SHA256SUMS.txt" \
              | sort
          )"
          actual_sorted="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort)"

          if [ "$actual_sorted" != "$expected_sorted" ]; then
            echo "GitHub Release asset names differ from expected."
            printf 'Expected assets:\n%s\n' "$expected_sorted"
            printf 'Actual assets:\n%s\n' "$actual_sorted"
            exit 1
          fi

          echo "GitHub Release $TAG has exactly the expected release assets."

      - name: Upload release artifacts
        # actions/upload-artifact@v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.ARTIFACT_BUNDLE_NAME }}
          path: |
            release-artifacts/LoadBalancerPro-${{ env.RELEASE_VERSION }}.jar
            release-artifacts/LoadBalancerPro-${{ env.RELEASE_VERSION }}-bom.json
            release-artifacts/LoadBalancerPro-${{ env.RELEASE_VERSION }}-bom.xml
            release-artifacts/LoadBalancerPro-${{ env.RELEASE_VERSION }}-SHA256SUMS.txt
          retention-days: 90
