# Copy/adapt prod API-key boundary settings.
# Use a real secret from your deployment environment, not this placeholder.
spring.profiles.active=prod
server.address=127.0.0.1
server.port=8080
loadbalancerpro.auth.mode=api-key
loadbalancerpro.api.key=${LOADBALANCERPRO_API_KEY:CHANGE_ME_LOCAL_API_KEY}
loadbalancerpro.proxy.enabled=false
cloud.liveMode=false
