version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    # Target the repository default branch.
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      maven-low-risk-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "spring-boot.version"
          - "org.springframework.boot:*"
          - "org.springdoc:*"
          - "org.openjfx:*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    # Target the repository default branch.
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    # Target the repository default branch.
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
